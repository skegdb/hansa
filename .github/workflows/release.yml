name: Release

# Publishes hansa, then hansa-cli, to crates.io in dependency order
# (hansa-cli depends on hansa). A short sleep lets the new hansa version
# reach the index before hansa-cli is verified against it. Trigger with a
# `v*` tag, or run manually (dry_run defaults to true so a manual run
# verifies without uploading).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the actual cargo publish (verify only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo publish hansa
        working-directory: crates/hansa
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            cargo publish --locked
          fi

      - name: wait for crates.io index propagation
        if: ${{ inputs.dry_run != true }}
        run: sleep 45

      - name: cargo publish hansa-cli
        working-directory: crates/hansa-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            cargo publish --locked
          fi
